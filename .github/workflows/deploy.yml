name: Deploy Caddy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, homelab]

    steps:
      - name: Execute deployment via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 10.0.0.20
          username: sd
          key: ${{ secrets.DOCKER_01 }}
          script: |
            cd /opt/caddy
            git pull origin main
            docker compose up -d --build
            docker system prune -f
